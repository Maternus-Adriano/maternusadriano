<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--ink:#0b1a26;
--ink-mid:#1e3448;
--ink-soft:#3b5168;
--gold:#c09a4a;
--gold-lt:#d4b572;
--gold-pale:rgba(192,154,74,0.12);
--parchment:#f5f1ea;
--parchment-dark:#eae4d9;
--rule:rgba(192,154,74,0.25);
--white:#ffffff;
--whatsapp:#25D366;
--type-body:'Jost',sans-serif;
--type-display:'Cormorant Garamond',serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--type-body);background:var(--parchment);color:var(--ink);line-height:1.7;font-size:16px;font-weight:300}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(11,26,38,0.96);backdrop-filter:blur(10px);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 6%;border-bottom:1px solid var(--rule)}
.nav-brand{font-family:var(--type-display);color:var(--gold-lt);font-size:1.05rem;font-weight:600;letter-spacing:.03em}
.nav-menu{display:flex;gap:2.2rem;list-style:none}
.nav-menu a{color:rgba(255,255,255,.6);text-decoration:none;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;font-weight:500;transition:color .2s}
.nav-menu a:hover{color:var(--gold-lt)}

/* ── HERO ── */
#hero{min-height:100vh;background:var(--ink);display:flex;align-items:center;padding:80px 6% 60px;position:relative;overflow:hidden}
.hero-texture{position:absolute;inset:0;opacity:.035;background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c09a4a' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.hero-grid-line{position:absolute;top:0;bottom:0;left:50%;width:1px;background:var(--rule);opacity:.4}
.hero-inner{max-width:1160px;margin:0 auto;width:100%;display:grid;grid-template-columns:1fr 360px;gap:80px;align-items:center;position:relative;z-index:1}
.hero-super{display:inline-flex;align-items:center;gap:12px;margin-bottom:28px}
.hero-super-bar{width:32px;height:1px;background:var(--gold)}
.hero-super-text{font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:500}
h1.hero-name{font-family:var(--type-display);font-size:clamp(3rem,5.5vw,5rem);color:var(--white);font-weight:700;line-height:1;margin-bottom:8px;letter-spacing:-.02em}
.hero-name-sub{font-family:var(--type-display);font-size:clamp(1.4rem,2.5vw,2rem);color:var(--gold-lt);font-weight:300;font-style:italic;margin-bottom:32px;letter-spacing:.01em}
.hero-tagline{font-family:var(--type-display);font-size:1.15rem;color:rgba(255,255,255,.78);font-style:italic;line-height:1.7;margin-bottom:16px;padding-left:20px;border-left:2px solid var(--gold)}
.hero-impact{font-size:.88rem;color:rgba(255,255,255,.5);line-height:1.75;margin-bottom:48px;font-weight:300}
.hero-actions{display:flex;gap:15px;flex-wrap:wrap}

/* Photo */
.photo-col{position:relative}
.photo-border{position:absolute;top:-14px;left:-14px;right:14px;bottom:-14px;border:1px solid rgba(192,154,74,.35);pointer-events:none;z-index:0}
.photo-corner{position:absolute;width:24px;height:24px;border-color:var(--gold);border-style:solid;opacity:.6}
.photo-corner.tl{top:-14px;left:-14px;border-width:2px 0 0 2px}
.photo-corner.tr{top:-14px;right:14px;border-width:2px 2px 0 0}
.photo-corner.bl{bottom:-14px;left:-14px;border-width:0 0 2px 2px}
.photo-corner.br{bottom:-14px;right:14px;border-width:0 2px 2px 0}
.photo-img{width:100%;aspect-ratio:3/4;object-fit:cover;object-position:top center;display:block;position:relative;z-index:1;filter:contrast(1.06) saturate(.92)}
.photo-badge{position:absolute;bottom:-14px;left:-14px;background:var(--gold);padding:10px 16px;z-index:2}
.photo-badge-text{font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);font-weight:600;line-height:1.4}

/* Buttons */
.btn-gold{background:var(--gold);color:var(--ink);padding:13px 30px;font-family:var(--type-body);font-size:.72rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;text-decoration:none;border:none;cursor:pointer;transition:background .2s,transform .15s;display:inline-flex;align-items:center;gap:8px;white-space:nowrap}
.btn-gold:hover{background:var(--gold-lt);transform:translateY(-2px)}
.btn-outline{background:transparent;color:rgba(255,255,255,.7);padding:13px 30px;font-family:var(--type-body);font-size:.72rem;font-weight:400;letter-spacing:.14em;text-transform:uppercase;text-decoration:none;border:1px solid rgba(255,255,255,0.22);transition:border-color .2s,color .2s;display:inline-flex;align-items:center;gap:8px;white-space:nowrap}
.btn-outline:hover{border-color:var(--gold);color:var(--gold-lt)}

/* ── SECTION SHELL ── */
section{padding:90px 6%}
.section-wrap{max-width:900px;margin:0 auto}
.section-wrap.wide{max-width:1060px}
.eyebrow{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.eyebrow-bar{width:28px;height:1px;background:var(--gold)}
.eyebrow-text{font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:500}
h2.sec-title{font-family:var(--type-display);font-size:clamp(1.8rem,3.2vw,2.8rem);color:var(--ink);font-weight:700;line-height:1.15;margin-bottom:40px}

/* ── ABOUT ── */
#about{background:var(--parchment)}
.about-lead{font-family:var(--type-display);font-size:1.28rem;color:var(--ink-mid);font-style:italic;line-height:1.75;margin-bottom:28px;font-weight:400}
.about-body p{font-size:.96rem;color:var(--ink-soft);line-height:1.85;margin-bottom:16px;font-weight:300}
.about-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--rule);margin-top:48px}
.stat-box{background:var(--parchment);padding:24px 20px;text-align:center}
.stat-num{font-family:var(--type-display);font-size:2.4rem;color:var(--gold);font-weight:700;line-height:1;margin-bottom:4px}
.stat-label{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);font-weight:500}

/* ── CHIEF OF STAFF BAND ── */
.cos-band{background:linear-gradient(135deg,var(--ink-mid),var(--ink));padding:36px 6%;margin-top:0}
.cos-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;gap:40px}
.cos-icon{width:56px;height:56px;border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cos-icon svg{width:26px;height:26px;stroke:var(--gold);fill:none;stroke-width:1.5}
.cos-title{font-family:var(--type-display);font-size:1.35rem;color:var(--white);font-weight:700;margin-bottom:6px}
.cos-text{font-size:.9rem;color:rgba(255,255,255,.62);line-height:1.65;font-weight:300}

/* ── PERSPECTIVE ── */
#policy{background:var(--ink-mid)}
#policy h2.sec-title{color:var(--white)}
.policy-quotes{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(192,154,74,.12);margin-top:8px}
.policy-q{background:rgba(11,26,38,.7);padding:36px 32px;position:relative;overflow:hidden}
.policy-q::after{content:'"';position:absolute;bottom:-10px;right:16px;font-family:var(--type-display);font-size:6rem;color:rgba(192,154,74,.08);line-height:1;pointer-events:none}
.policy-q p{font-family:var(--type-display);font-size:1.08rem;color:rgba(255,255,255,.82);line-height:1.7;font-style:italic;font-weight:300;position:relative;z-index:1}

/* ── EXPERIENCE ── */
#experience{background:var(--parchment-dark)}
.exp-timeline{position:relative;padding-left:28px;border-left:1px solid var(--rule)}
.exp-dot{position:absolute;left:-5px;top:6px;width:9px;height:9px;background:var(--gold);border-radius:50%}
.exp-item{position:relative;padding-bottom:48px}
.exp-period{font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:6px}
.exp-org{font-family:var(--type-display);font-size:1.35rem;color:var(--ink);font-weight:700;margin-bottom:2px}
.exp-role{font-size:.82rem;color:var(--ink-soft);font-weight:500;letter-spacing:.06em;text-transform:uppercase;margin-bottom:18px;font-style:italic}
.exp-bullets{list-style:none}
.exp-bullets li{font-size:.93rem;color:var(--ink-soft);padding:4px 0 4px 18px;position:relative;line-height:1.72;font-weight:300}
.exp-bullets li::before{content:'–';position:absolute;left:0;color:var(--gold)}
.exp-tag{display:inline-block;background:var(--gold-pale);border:1px solid rgba(192,154,74,.3);color:var(--gold);font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;padding:3px 10px;margin-bottom:14px;font-weight:500}

/* ── CONTRIBUTIONS ── */
#contributions{background:var(--parchment)}
.contrib-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.contrib-card{border:1px solid var(--rule);padding:32px 28px;background:var(--white);transition:border-color .2s,transform .2s}
.contrib-card:hover{border-color:var(--gold);transform:translateY(-3px)}
.contrib-tag{font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:10px;display:block}
.contrib-title{font-family:var(--type-display);font-size:1.12rem;color:var(--ink);font-weight:700;margin-bottom:14px;line-height:1.3}
.contrib-body{font-size:.9rem;color:var(--ink-soft);line-height:1.75;font-weight:300}

/* ── FOCUS ── */
#focus{background:var(--ink);padding:70px 6%}
#focus h2.sec-title{color:var(--white)}
.focus-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(192,154,74,.15);margin-top:8px}
.focus-cell{background:var(--ink);padding:30px 24px}
.focus-num{font-family:var(--type-display);font-size:2.2rem;color:rgba(192,154,74,.2);font-weight:700;line-height:1;margin-bottom:8px}
.focus-name{font-family:var(--type-display);font-size:1.05rem;color:var(--white);font-weight:600;margin-bottom:8px}
.focus-desc{font-size:.82rem;color:rgba(255,255,255,.5);line-height:1.65;font-weight:300}

/* ── CERTIFICATIONS ── */
#certs{background:var(--parchment-dark);padding:60px 6%}
.cert-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
.cert-chip{background:var(--white);border:1px solid var(--rule);padding:9px 18px;font-size:.78rem;color:var(--ink-soft);letter-spacing:.06em;font-weight:400;transition:border-color .2s}
.cert-chip:hover{border-color:var(--gold);color:var(--ink)}

/* ── THOUGHT LEADERSHIP ── */
#thought{background:var(--parchment)}
.tl-intro{font-family:var(--type-display);font-size:1.12rem;color:var(--ink-mid);font-style:italic;line-height:1.8;margin-bottom:40px;font-weight:400}
.tl-items{list-style:none}
.tl-items li{display:flex;gap:18px;align-items:flex-start;padding:18px 0;border-bottom:1px solid var(--rule);font-size:.95rem;color:var(--ink-soft);font-weight:300;line-height:1.7}
.tl-arrow{color:var(--gold);font-size:1rem;flex-shrink:0;margin-top:2px;font-weight:600}

/* ── CONTACT ── */
#contact{background:var(--ink-mid)}
#contact h2.sec-title{color:var(--white)}
.contact-quote{font-family:var(--type-display);font-size:1.18rem;color:rgba(255,255,255,.72);font-style:italic;line-height:1.75;margin-bottom:48px;padding-left:20px;border-left:2px solid var(--gold)}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(192,154,74,0.15);margin-bottom:40px}
.contact-cell{background:var(--ink-mid);padding:24px 26px}
.contact-cell-label{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:6px;display:block}
.contact-cell-value{font-size:.96rem;color:rgba(255,255,255,0.8);font-weight:300;display:flex;align-items:center;gap:10px}
.contact-cell-value a{color:inherit;text-decoration:none;transition:color .2s}
.contact-cell-value a:hover{color:var(--gold-lt)}

.contact-cta{display:flex;justify-content:center;align-items:center;gap:15px;flex-wrap:wrap;padding-top:32px;border-top:1px solid rgba(192,154,74,0.2)}
.contact-note{width:100%;text-align:center;font-size:.84rem;color:rgba(255,255,255,.4);margin-top:16px;font-weight:300;font-style:italic}

/* ── FLOATING BUTTONS ── */
.floating-container {position:fixed;bottom:30px;right:30px;display:flex;flex-direction:column;gap:12px;z-index:1000}
.floating-btn {width:50px;height:50px;border-radius:50%;display:
