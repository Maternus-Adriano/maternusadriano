<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Maternus Adriano</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --dark: #181614; --gold: #c9a96e; --off-white: #e8e2d9; --muted: #7a7062; }

    html, body {
      height: 100%; background: var(--dark);
      color: var(--off-white); font-family: 'Montserrat', sans-serif;
      overflow: hidden;
    }

    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: .4;
    }

    /* PAGE — three rows, strictly 100dvh */
    .page {
      position: relative; z-index: 1;
      height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: clamp(.9rem,2vh,1.8rem) clamp(1.4rem,6vw,5rem);
      overflow: hidden;
    }

    /* ── HEADER ── */
    header { display: flex; align-items: baseline; gap: 1rem; animation: fadeUp .9s ease both; }
    .name { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: clamp(1.1rem,2vw,1.6rem); letter-spacing: .02em; }
    .badge { font-size: .55rem; letter-spacing: .2em; color: var(--gold); }
    .hline { margin-top: .5rem; height: 1px; background: linear-gradient(to right,var(--gold),transparent); opacity: .35; animation: expandLine 1.3s ease both .3s; transform-origin: left; }

    /* ── MAIN ── */
    main { display: flex; flex-direction: column; justify-content: center; min-height: 0; }

    .label { display: flex; align-items: center; gap: .8rem; margin-bottom: clamp(.7rem,1.8vh,1.4rem); animation: fadeUp 1s ease both .5s; }
    .lline { width: 1.8rem; height: 1px; background: var(--gold); opacity: .7; }
    .ltext { font-size: .54rem; letter-spacing: .28em; color: var(--gold); text-transform: uppercase; }

    h1 {
      font-family: 'Cormorant Garamond', serif; font-weight: 300;
      font-size: clamp(1.9rem,5.8vw,5rem); line-height: 1.06;
      animation: fadeUp 1.1s ease both .7s;
    }
    h1 em { font-style: italic; color: var(--gold); }

    .sub {
      margin-top: clamp(.6rem,1.5vh,1.1rem);
      font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 300;
      font-size: clamp(.78rem,1.4vw,1.05rem); color: var(--muted); line-height: 1.7;
      animation: fadeUp 1.2s ease both .9s;
    }

    /* ── STATUS STRIP ── */
    .strip {
      margin-top: clamp(.8rem,2.2vh,1.8rem);
      padding-top: clamp(.7rem,1.8vh,1.4rem);
      border-top: 1px solid rgba(201,169,110,.2);
      display: flex; flex-direction: column;
      gap: clamp(.55rem,1.5vh,1.1rem);
      animation: fadeUp 1s ease both 1.1s;
    }

    /* Typewriter */
    .tw-row { display: flex; align-items: center; gap: .9rem; }
    .tw-pill { font-size: .5rem; letter-spacing: .18em; color: var(--dark); background: var(--gold); padding: .22rem .65rem; text-transform: uppercase; flex-shrink: 0; }
    .tw-text { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: clamp(.95rem,1.8vw,1.4rem); color: var(--off-white); display: flex; align-items: center; }
    .cursor { display: inline-block; width: 2px; height: .85em; background: var(--gold); margin-left: 2px; animation: blink 1s step-end infinite; flex-shrink: 0; }

    /* Countdown */
    .cd-row { display: flex; align-items: flex-end; gap: clamp(.7rem,2vw,1.8rem); }
    .cd-eye { font-size: .48rem; letter-spacing: .2em; color: var(--muted); text-transform: uppercase; padding-bottom: .35rem; flex-shrink: 0; }
    .cd-units { display: flex; align-items: flex-end; gap: clamp(.4rem,1.2vw,1rem); }
    .cd-u { text-align: center; }
    .cd-n { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.8rem,4vw,3.4rem); font-weight: 300; color: var(--gold); line-height: 1; display: block; }
    .cd-l { font-size: .42rem; letter-spacing: .22em; color: var(--muted); text-transform: uppercase; display: block; margin-top: .28rem; }
    .cd-sep { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.4rem,3vw,2.6rem); color: rgba(201,169,110,.2); padding-bottom: .42rem; }

    /* ── FOOTER ── */
    .foot { font-size: .44rem; letter-spacing: .22em; color: var(--muted); text-transform: uppercase; animation: fadeUp 1s ease both 1.4s; padding-bottom: .1rem; }

    /* ANIMATIONS */
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    @keyframes expandLine { from{transform:scaleX(0);opacity:0} to{transform:scaleX(1);opacity:.35} }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes flip { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:translateY(0)} }
    .flip { animation: flip .2s ease both; }
  </style>
</head>
<body>
<div class="page">

  <div>
    <header>
      <span class="name">Maternus Adriano</span>
      <span class="badge">ZNZ</span>
    </header>
    <div class="hline"></div>
  </div>

  <main>
    <div class="label">
      <div class="lline"></div>
      <span class="ltext">Selected Work</span>
    </div>

    <h1>
      What actually happened<br>
      in <em>three real situations</em>
    </h1>

    <p class="sub">
      "What do you actually do?" Three honest accounts of the situation,<br>
      the challenge, and what came out of it.
    </p>

    <div class="strip">
      <div class="tw-row">
        <span class="tw-pill">Status</span>
        <div class="tw-text"><span id="tw"></span><span class="cursor"></span></div>
      </div>
      <div class="cd-row">
        <span class="cd-eye">Launching&nbsp;June&nbsp;1</span>
        <div class="cd-units">
          <div class="cd-u"><span class="cd-n" id="cd">00</span><span class="cd-l">Days</span></div>
          <span class="cd-sep">:</span>
          <div class="cd-u"><span class="cd-n" id="ch">00</span><span class="cd-l">Hours</span></div>
          <span class="cd-sep">:</span>
          <div class="cd-u"><span class="cd-n" id="cm">00</span><span class="cd-l">Min</span></div>
          <span class="cd-sep">:</span>
          <div class="cd-u"><span class="cd-n" id="cs">00</span><span class="cd-l">Sec</span></div>
        </div>
      </div>
    </div>
  </main>

  <div class="foot">&copy; 2026 Maternus Adriano</div>

</div>
<script>
  const phrases=["Rewriting the story.","Something worth the wait.","The work speaks for itself.","Almost ready — almost.","A new chapter, loading."];
  let pi=0,ci=0,del=false,tw=document.getElementById('tw');
  function type(){const p=phrases[pi];if(!del){tw.textContent=p.slice(0,++ci);if(ci===p.length){del=true;setTimeout(type,2800);return;}setTimeout(type,58);}else{tw.textContent=p.slice(0,--ci);if(ci===0){del=false;pi=(pi+1)%phrases.length;setTimeout(type,400);return;}setTimeout(type,30);}}
  setTimeout(type,1600);

  const LAUNCH=new Date('2026-06-01T00:00:00'),pad=v=>String(v).padStart(2,'0');
  const E={d:document.getElementById('cd'),h:document.getElementById('ch'),m:document.getElementById('cm'),s:document.getElementById('cs')},P={};
  function tick(){
    const diff=Math.max(0,LAUNCH-Date.now());
    const V={d:Math.floor(diff/864e5),h:Math.floor((diff%864e5)/36e5),m:Math.floor((diff%36e5)/6e4),s:Math.floor((diff%6e4)/1e3)};
    for(const[k,v]of Object.entries(V)){const s=pad(v);if(s!==P[k]){E[k].textContent=s;E[k].classList.remove('flip');void E[k].offsetWidth;E[k].classList.add('flip');P[k]=s;}}
  }
  tick();setInterval(tick,1000);
</script>
</body>
</html>
